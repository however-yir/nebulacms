apiVersion: v1alpha1
kind: "Role"
metadata:
  name: anonymous
  labels:
    nebulacms.io/role-template: "true"
    nebulacms.io/hidden: "true"
  annotations:
    rbac.authorization.nebulacms.io/dependencies: |
      [ "role-template-own-permissions", "role-template-public-apis" ]
rules:
  - apiGroups: [ "api.nebulacms.io" ]
    resources: [ "comments", "comments/reply" ]
    verbs: [ "create", "get", "list" ]
  - apiGroups: [ "api.nebulacms.io" ]
    resources: [ "*" ]
    verbs: [ "*" ]
  - apiGroups: [ "api.console.nebulacms.io" ]
    resources: [ "users" ]
    resourceNames: [ "-" ]
    verbs: [ "get" ]
  - nonResourceURLs: [ "/apis/api.nebulacms.io/v1alpha1/trackers/*" ]
    verbs: [ "create" ]
  - nonResourceURLs: [ "/actuator/globalinfo", "/actuator/health", "/actuator/health/*", "/login/public-key" ]
    verbs: [ "get" ]
---
apiVersion: v1alpha1
kind: "Role"
metadata:
  name: role-template-public-apis
  labels:
    nebulacms.io/role-template: "true"
    nebulacms.io/hidden: "true"
rules:
  - apiGroups: [ "api.nebulacms.io" ]
    resources: [ "*" ]
    verbs: [ "get", "list" ]
  - apiGroups: [ "api.content.nebulacms.io" ]
    resources: [ "*" ]
    verbs: [ "get", "list" ]
  - apiGroups: [ "api.plugin.nebulacms.io" ]
    resources: [ "*" ]
    verbs: [ "get", "list" ]
  - apiGroups: [ "api.notification.nebulacms.io" ]
    resources: [ "subscriptions/unsubscribe" ]
    verbs: [ "get", "list" ]
  - apiGroups: [ "api.storage.nebulacms.io" ]
    resources: [ "thumbnails/via-uri" ]
    verbs: [ "get", "list" ]