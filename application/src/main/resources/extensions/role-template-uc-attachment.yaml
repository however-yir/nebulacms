apiVersion: v1alpha1
kind: Role
metadata:
  name: role-template-uc-attachment-manager
  labels:
    nebulacms.io/role-template: "true"
  annotations:
    rbac.authorization.nebulacms.io/module: "Attachments Management"
    rbac.authorization.nebulacms.io/display-name: "UC Attachment Manage"
    rbac.authorization.nebulacms.io/ui-permissions: |
      [ "uc:attachments:manage" ]
rules:
  - apiGroups: [ "uc.api.storage.nebulacms.io" ]
    resources: [ "attachments", "attachments/upload", "attachments/upload-from-url" ]
    verbs: [ "create", "list" ]
